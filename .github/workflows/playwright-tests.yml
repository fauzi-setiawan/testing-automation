name: Playwright E2E Tests

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'ID Project dari Database'
        required: true
      test_filter:
        description: 'Filter test (contoh: auth, project, atau kosong untuk semua)'
        required: false
        default: ''
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      triggered_by:
        description: 'User ID yang memicu (diisi otomatis dari sistem)'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch Project Credentials
        id: fetch-creds
        run: |
          APP="${{ secrets.APP_URL }}"
          if [ -z "$APP" ]; then
            echo "⚠️ APP_URL secret belum diatur!"
            exit 1
          fi
          
          # Fetch JSON credentials from QA Dashboard API
          RESPONSE=$(curl -s -X GET "${APP}/api/automation/projects/${{ github.event.inputs.project_id }}/credentials" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Accept: application/json")
          
          # Extract variables using jq
          BASE_URL=$(echo $RESPONSE | jq -r '.base_url')
          USERNAME=$(echo $RESPONSE | jq -r '.username')
          PASSWORD=$(echo $RESPONSE | jq -r '.password')
          
          # Mask password in logs
          echo "::add-mask::$PASSWORD"
          
          # Export to environment for next steps
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
          echo "TEST_EMAIL=$USERNAME" >> $GITHUB_ENV
          echo "TEST_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            npx playwright test --grep "$FILTER" --reporter=json,html
          else
            npx playwright test --reporter=json,html
          fi
        env:
          CI: true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload JSON Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 14

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}
          keep_files: true

      - name: Notify backend hasil run
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          APP="${{ secrets.APP_URL }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPORT_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/reports/${{ github.run_id }}/"
          if [ -z "$APP" ]; then
            echo "⚠️ APP_URL secret belum diatur, skip notifikasi webhook"
            exit 0
          fi
          curl -sf -X POST "${APP}/api/automation/webhook/run-complete" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "status": "'"$STATUS"'",
              "triggered_by": "${{ github.event.inputs.triggered_by }}",
              "filter": "${{ github.event.inputs.test_filter }}",
              "environment": "${{ github.event.inputs.environment }}",
              "report_url": "'"$REPORT_URL"'"
            }' || echo "⚠️ Webhook notification gagal (backend mungkin tidak terjangkau), tapi test tetap sukses"
